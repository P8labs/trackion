name: Release Go Server

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          OUTPUT="trackion-server_${VERSION}_${GOOS}_${GOARCH}${{ matrix.ext }}"
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=$VERSION" -o "dist/$OUTPUT" ./cmd

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: trackion-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release-go-assets:
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: trackion-*
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          make_latest: true
          body: |
            ## Trackion Server Release

            Prebuilt binaries for this version are attached as assets.

            ### Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/trackion:${{ github.ref_name }}
            ```

            ### Notes
            See the [documentation](https://trackion.tech/docs/) for more information.
            Auto-generated changelog entries are included below.

  release-docker-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release version
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/trackion
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
