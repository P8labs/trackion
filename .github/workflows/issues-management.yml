name: Issues Management

on:
  issues:
    types:
      - opened
      - reopened
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  triage-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Ensure triage labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: "needs-triage", color: "fbca04", description: "Issue needs triage" },
              { name: "stale", color: "ededed", description: "No recent activity" }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label
                  });
                } else {
                  throw error;
                }
              }
            }

      - name: Add triage label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ["needs-triage"]
            });

      - name: Post triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const marker = "<!-- trackion-issue-triage -->";
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100
            });

            const alreadyPosted = comments.some((c) =>
              typeof c.body === "string" && c.body.includes(marker)
            );

            if (!alreadyPosted) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `${marker}\nThanks for opening this issue. A maintainer will triage it soon.\n\nTo speed things up, please include:\n- clear reproduction steps\n- expected vs actual behavior\n- environment details (OS, browser, versions)\n- relevant logs or screenshots`
              });
            }

  stale-issues:
    if: github.event_name != 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Mark and close stale issues
        uses: actions/stale@v9
        with:
          stale-issue-label: stale
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-message: |
            This issue has been automatically marked as stale due to inactivity.
            If this is still relevant, comment with an update and the stale label will be removed.
          close-issue-message: |
            Closing this issue due to inactivity.
            Feel free to reopen with fresh context if the problem still exists.
          exempt-issue-labels: pinned,security,help wanted
          exempt-all-milestones: true
          operations-per-run: 200
