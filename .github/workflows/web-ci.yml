name: Web Checks CI
on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/lib/**"

permissions:
  contents: read

jobs:
  web-checks:
    name: Web Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter @trackion/ui --filter @trackion/lib build

      - name: Type-check web
        run: pnpm --filter web exec tsc --noEmit

      - name: Build web
        run: pnpm --filter web build
