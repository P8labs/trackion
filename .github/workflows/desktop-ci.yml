name: Desktop CI

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.changes.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect desktop-related changes
        id: changes
        shell: bash
        run: |
          if git diff --name-only \
            origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(apps/desktop/|packages/ui/|packages/lib/)'
          then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  desktop-build:
    name: Desktop Build Check
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'

    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter @trackion/ui --filter @trackion/lib build

      - name: Type-check desktop
        run: pnpm --filter desktop exec tsc --noEmit

      - name: Build desktop frontend
        run: pnpm --filter desktop build

      - name: Build Tauri app
        run: pnpm --filter desktop tauri build --no-sign
