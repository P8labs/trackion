name: Desktop CI

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "apps/desktop/**"
      - "packages/ui/**"
      - "packages/lib/**"

jobs:
  desktop-build:
    name: Desktop Build Check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter @trackion/ui --filter @trackion/lib build

      - name: Type-check desktop
        run: pnpm --filter desktop exec tsc --noEmit

      - name: Build desktop frontend
        run: pnpm --filter desktop build

      - name: Build Tauri app
        run: pnpm --filter desktop tauri build --no-sign
