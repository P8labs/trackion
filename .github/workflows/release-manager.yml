name: Release Manager

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  create-bump-pr:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release') && !contains(github.event.pull_request.labels.*.name, 'release-bump')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve bump type from labels
        id: bump
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          labels=$(echo "$PR_LABELS" | tr '[:upper:]' '[:lower:]')
          bump_type="patch"

          if [[ "$labels" == *"major"* ]]; then
            bump_type="major"
          elif [[ "$labels" == *"minor"* ]]; then
            bump_type="minor"
          elif [[ "$labels" == *"patch"* ]]; then
            bump_type="patch"
          fi

          echo "bump_type=$bump_type" >> "$GITHUB_OUTPUT"

      - name: Bump version (no commit/tag yet)
        run: |
          printf 'y\nn\n' | ./scripts/bump-version.sh "${{ steps.bump.outputs.bump_type }}"

      - name: Create bump PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version"
          branch: "chore/release-bump-${{ github.run_id }}"
          title: "chore: bump version"
          body: |
            Auto-generated release bump PR.

            - Source PR: #${{ github.event.pull_request.number }}
            - Requested bump: `${{ steps.bump.outputs.bump_type }}`
          labels: |
            release-bump

      - name: Enable auto-merge for bump PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash --delete-branch

  tag-after-bump-pr-merge:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release-bump')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tag
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally"
          else
            git tag -a "$TAG" -m "Release $VERSION"
          fi

          git push origin "$TAG"
