services:
  db:
    container_name: trackion-db
    image: postgres:15-alpine
    # restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trackion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackion}
      POSTGRES_DB: ${POSTGRES_DB:-trackion}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trackion} -d ${POSTGRES_DB:-trackion}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data


volumes:
  db-data:
